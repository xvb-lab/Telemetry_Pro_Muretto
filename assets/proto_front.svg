<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none"
     stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"
     stroke-linejoin="round">
  <!-- LMU Telemetry Pro — prototipo Le Mans, vista frontale, line-art
       bianca su trasparente (23/07). Meta' destra disegnata, sinistra
       specchiata. -->
  <defs>
    <g id="half">
      <!-- parafango: cupola larga sopra la ruota -->
      <path d="M 30,300 L 30,258 C 30,206 62,172 128,166 C 208,168 252,196 262,238 L 264,300"/>
      <!-- spalla interna del parafango verso il muso -->
      <path d="M 262,238 C 250,242 210,248 180,250"/>
      <!-- taglio faro sul fronte del parafango -->
      <path d="M 52,214 C 84,196 128,190 158,194 C 158,206 152,216 140,220 C 108,224 74,222 52,214 Z"/>
      <path d="M 66,208 L 130,204" stroke-width="1.8"/>
      <!-- canard/diveplane sul fianco -->
      <path d="M 30,268 L 6,276" stroke-width="2.0"/>
      <path d="M 32,248 L 10,254" stroke-width="2.0"/>
      <!-- specchietto accanto all'abitacolo -->
      <path d="M 268,168 L 296,150 L 322,152 L 320,168 L 294,172 Z"/>
      <!-- raccordo parafango -> abitacolo -->
      <path d="M 200,166 C 240,148 278,136 314,132"/>
      <!-- presa d'aria sul cofano tra parafango e centro -->
      <path d="M 236,258 C 268,250 300,246 330,246" stroke-width="1.8"/>
      <path d="M 244,274 C 276,266 308,262 338,262" stroke-width="1.8"/>
      <!-- splitter: labbro inferiore -->
      <path d="M 24,326 L 214,330"/>
      <path d="M 214,330 C 280,332 330,334 400,334"/>
      <!-- bordo inferiore del muso sopra lo splitter -->
      <path d="M 30,300 C 96,306 180,310 264,310 C 312,312 360,313 400,313"/>
      <path d="M 264,300 C 310,302 356,303 400,303" stroke-width="1.8"/>
      <!-- fianco basso: paratia verticale dello splitter -->
      <path d="M 24,326 L 24,306 L 30,300"/>
    </g>
  </defs>

  <!-- meta' sinistra (specchiata) e destra -->
  <use href="#half" transform="translate(800,0) scale(-1,1)"/>
  <use href="#half"/>

  <!-- ══ centro macchina ══ -->
  <!-- canopy: cupola abitacolo -->
  <path d="M 314,132 C 322,86 352,60 400,60 C 448,60 478,86 486,132"/>
  <!-- parabrezza dentro la cupola -->
  <path d="M 330,132 C 338,98 364,78 400,78 C 436,78 462,98 470,132"/>
  <path d="M 400,78 L 400,60" stroke-width="1.8"/>
  <!-- base del canopy sul cofano -->
  <path d="M 314,132 C 342,140 372,144 400,144 C 428,144 458,140 486,132"/>
  <!-- roof scoop: presa d'aria bassa e larga sopra la cupola -->
  <path d="M 362,58 C 370,47 384,42 400,42 C 416,42 430,47 438,58"/>
  <path d="M 374,54 C 382,49 390,47 400,47 C 410,47 418,49 426,54" stroke-width="1.8"/>
  <!-- muso centrale: dorso che scende dal canopy -->
  <path d="M 348,144 C 344,196 348,252 356,290"/>
  <path d="M 452,144 C 456,196 452,252 444,290"/>
  <!-- naso: punta centrale -->
  <path d="M 356,290 C 370,296 430,296 444,290"/>
  <path d="M 366,290 C 372,262 428,262 434,290" stroke-width="1.8"/>
  <!-- narici sul muso -->
  <path d="M 372,196 C 390,192 410,192 428,196" stroke-width="1.8"/>
  <path d="M 370,214 C 390,210 410,210 430,214" stroke-width="1.8"/>
</svg>
