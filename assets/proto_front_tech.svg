<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" fill="none"
     stroke-linecap="round" stroke-linejoin="round">
  <!-- LMU Telemetry Pro — prototipo vista frontale, versione TECNICA
       (23/07): ruote a vista col camber, centro di rollio, linee dei
       centri istantanei, frecce forze. Bianco su trasparente; layer
       tecnico nei colori app (rosso #ff1d43, verde #37d67a,
       azzurro #2fa8e0, grigio #9aa0ab). -->

  <!-- ══ LAYER TECNICO SOTTO (linee di costruzione) ══ -->
  <g id="tech-under" stroke="#9aa0ab" stroke-width="1.6">
    <!-- linea di terra -->
    <path d="M 20,368 L 880,368" stroke-width="2.2"/>
    <!-- asse centrale -->
    <path d="M 450,40 L 450,368" stroke-dasharray="7 7"/>
    <!-- linee dei centri istantanei: dal contatto ruota all'interno -->
    <path d="M 150,364 L 700,268" stroke="#ff1d43" stroke-width="1.8"/>
    <path d="M 750,364 L 200,268" stroke="#37d67a" stroke-width="1.8"/>
    <!-- proiezione tratteggiata a terra del braccio -->
    <path d="M 150,364 L 450,364" stroke-dasharray="5 6"/>
  </g>

  <!-- ══ MACCHINA (bianca) ══ -->
  <g stroke="#ffffff" stroke-width="2.4">
    <defs>
      <g id="halft">
        <!-- parafango (corpo piu' stretto: le ruote restano a vista) -->
        <path d="M 205,318 L 205,268 C 205,224 232,196 285,190 C 350,192 386,216 394,252 L 396,318"/>
        <path d="M 394,252 C 384,256 352,262 328,264"/>
        <!-- faro -->
        <path d="M 222,232 C 248,218 284,212 308,216 C 308,226 302,234 292,238 C 266,241 238,239 222,232 Z"/>
        <!-- specchietto -->
        <path d="M 366,186 L 386,170 L 408,172 L 406,186 L 384,190 Z"/>
        <!-- spalla verso il canopy -->
        <path d="M 330,190 C 354,178 376,170 398,166"/>
        <!-- prese cofano -->
        <path d="M 372,276 C 398,270 424,267 448,267" stroke-width="1.8"/>
        <!-- splitter -->
        <path d="M 200,344 L 340,347 C 380,348 420,349 450,349"/>
        <path d="M 205,318 C 258,324 330,328 396,328 C 414,329 432,330 450,330"/>
        <path d="M 200,344 L 200,324 L 205,318"/>
        <!-- sospensione: braccetti verso il centro (a vista) -->
        <path d="M 205,296 L 118,304" stroke-width="2.0"/>
        <path d="M 205,318 L 122,330" stroke-width="2.0"/>
      </g>
      <g id="wheelt">
        <!-- gomma: rettangolo arrotondato, camber negativo (alto verso
             l'interno); cerchio = banda centrale -->
        <g transform="rotate(-3.5, 105, 320)">
          <rect x="68" y="252" width="74" height="136" rx="26"/>
          <path d="M 74,282 L 136,282" stroke-width="2.0"/>
          <path d="M 74,358 L 136,358" stroke-width="2.0"/>
          <path d="M 82,300 L 128,300" stroke-width="1.4"/>
          <path d="M 82,340 L 128,340" stroke-width="1.4"/>
        </g>
      </g>
    </defs>
    <use href="#halft"/>
    <use href="#halft" transform="translate(900,0) scale(-1,1)"/>
    <use href="#wheelt"/>
    <use href="#wheelt" transform="translate(900,0) scale(-1,1)"/>
    <!-- canopy: cupola larga -->
    <path d="M 398,166 C 406,118 426,96 450,96 C 474,96 494,118 502,166"/>
    <path d="M 414,166 C 420,132 433,112 450,112 C 467,112 480,132 486,166" stroke-width="1.8"/>
    <path d="M 398,166 C 432,174 468,174 502,166"/>
    <!-- scoop -->
    <path d="M 424,94 C 432,84 440,80 450,80 C 460,80 468,84 476,94"/>
    <!-- dorso del muso -->
    <path d="M 436,172 C 433,222 436,268 442,306"/>
    <path d="M 464,172 C 467,222 464,268 458,306"/>
    <path d="M 442,306 C 446,310 454,310 458,306"/>
  </g>

  <!-- ══ LAYER TECNICO SOPRA (punti e frecce) ══ -->
  <g id="tech-over">
    <!-- centro di rollio -->
    <circle cx="450" cy="300" r="6" fill="#ff1d43" stroke="none"/>
    <!-- baricentro -->
    <circle cx="450" cy="210" r="6" fill="#2fa8e0" stroke="none"/>
    <!-- forza laterale al baricentro -->
    <g stroke="#ff1d43" stroke-width="5" fill="#ff1d43">
      <path d="M 444,210 L 320,210"/>
      <path d="M 322,199 L 298,210 L 322,221 Z" stroke="none"/>
    </g>
    <!-- carico verticale sulle ruote: giu' l'esterna, su l'interna -->
    <g stroke="#37d67a" stroke-width="4" fill="#37d67a">
      <path d="M 795,330 L 795,296"/>
      <path d="M 786,298 L 795,278 L 804,298 Z" stroke="none"/>
    </g>
    <g stroke="#37d67a" stroke-width="4" fill="#37d67a">
      <path d="M 105,306 L 105,340"/>
      <path d="M 96,338 L 105,358 L 114,338 Z" stroke="none"/>
    </g>
    <!-- arco d'angolo del centro istantaneo (a sinistra) -->
    <path d="M 218,352 A 60 60 0 0 1 208,318" stroke="#ff1d43"
          stroke-width="2" fill="none"/>
  </g>
</svg>
